name: Lightning overview

on:
  workflow_dispatch:
  schedule:
    # Runs at both possible UTC times for 00:05 Prague time.
    # The Prague-time check below decides whether overview really runs.
    - cron: "5 22 * * *"
    - cron: "5 23 * * *"

permissions:
  contents: write

concurrency:
  group: lightning-overview-main
  cancel-in-progress: true

jobs:
  overview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest repo state
        run: |
          git config pull.rebase true
          git pull --rebase origin main

      - name: Check overview time
        id: timecheck
        run: |
          HOUR=$(TZ=Europe/Prague date +%H)
          MINUTE=$(TZ=Europe/Prague date +%M)

          echo "Prague time: $HOUR:$MINUTE"

          if [ "$HOUR" = "00" ] && [ "$MINUTE" = "05" ]; then
            echo "run_overview=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run, overview allowed."
            echo "run_overview=true" >> $GITHUB_OUTPUT
          else
            echo "Not 00:05 Prague time, skipping overview."
            echo "run_overview=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if not overview time
        if: steps.timecheck.outputs.run_overview != 'true'
        run: |
          echo "Skipping overview because it is not 00:05 Prague time."

      - name: Set up Python
        if: steps.timecheck.outputs.run_overview == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install overview packages
        if: steps.timecheck.outputs.run_overview == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib geopandas shapely scipy pyogrio fiona pyproj

      - name: Prepare archive folders from data CSVs
        if: steps.timecheck.outputs.run_overview == 'true'
        run: |
          rm -rf output/archive
          mkdir -p output/archive

          echo "Building output/archive from data/YYYY-MM-DD.csv files..."

          for csv in data/*.csv; do
            [ -f "$csv" ] || continue
            name=$(basename "$csv" .csv)

            if echo "$name" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              mkdir -p "output/archive/$name"
              cp "$csv" "output/archive/$name/$name.csv"
              echo "Prepared output/archive/$name/$name.csv"
            else
              echo "Skipped non-daily CSV: $csv"
            fi
          done

          echo ""
          echo "Archive CSV files:"
          find output/archive -maxdepth 2 -type f -name "*.csv" | sort || true

      - name: Run overview.py
        if: steps.timecheck.outputs.run_overview == 'true'
        run: |
          python overview.py

      - name: Copy generated PNGs to website folders
        if: steps.timecheck.outputs.run_overview == 'true'
        run: |
          rm -rf img/lightning/days img/lightning/week img/lightning/month img/lightning/year

          mkdir -p img/lightning/days
          mkdir -p img/lightning/week
          mkdir -p img/lightning/month
          mkdir -p img/lightning/year

          copy_pngs () {
            SRC="$1"
            DEST="$2"
            mkdir -p "$DEST"

            if ls "$SRC"/*.png >/dev/null 2>&1; then
              cp "$SRC"/*.png "$DEST/"
              echo "Copied PNGs from $SRC to $DEST"
            else
              echo "No PNGs in $SRC"
            fi
          }

          if [ -d output/overviews/days ]; then
            for folder in output/overviews/days/*; do
              [ -d "$folder" ] || continue
              name=$(basename "$folder")
              copy_pngs "$folder" "img/lightning/days/$name"
            done
          fi

          if [ -d output/overviews/week ]; then
            for folder in output/overviews/week/*; do
              [ -d "$folder" ] || continue
              name=$(basename "$folder" | sed 's/-W/_W/')
              copy_pngs "$folder" "img/lightning/week/$name"
            done
          fi

          if [ -d output/overviews/month ]; then
            for folder in output/overviews/month/*; do
              [ -d "$folder" ] || continue
              name=$(basename "$folder" | sed 's/-/_/')
              copy_pngs "$folder" "img/lightning/month/$name"
            done
          fi

          if [ -d output/overviews/year ]; then
            for folder in output/overviews/year/*; do
              [ -d "$folder" ] || continue
              name=$(basename "$folder")
              copy_pngs "$folder" "img/lightning/year/$name"
            done
          fi

          echo ""
          echo "Final website PNGs:"
          find img/lightning -type f -name "*.png" | sort || true

      - name: Commit overview outputs
        if: steps.timecheck.outputs.run_overview == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A img/lightning output/overviews output/archive

          if git diff --cached --quiet; then
            echo "No overview changes."
            exit 0
          fi

          git commit -m "Update lightning overview PNGs"
          git pull --rebase origin main
          git push origin main
