name: Update lightning

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

permissions:
  contents: write

concurrency:
  group: update-lightning-main
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync latest repo
        run: |
          git pull --ff-only origin main || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install live packages
        run: |
          pip install requests

      - name: Prepare data folder
        run: mkdir -p data

      - name: Run lightning once
        run: python lightning_live_map.py
        env:
          RUN_ONCE: "1"

      - name: Convert latest lightning to GeoJSON
        run: python csv_to_geojson.py

      - name: Commit and push lightning
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/latest_europe.geojson data/*.csv || true

          if git diff --cached --quiet; then
            echo "No lightning changes."
            exit 0
          fi

          git commit -m "Update lightning"

          git pull --rebase origin main || {
            echo "Rebase failed. Trying normal pull..."
            git rebase --abort || true
            git pull origin main --no-rebase || true
          }

          git push || {
            echo "Push failed. Retrying..."
            git pull --rebase origin main || true
            git push
          }
