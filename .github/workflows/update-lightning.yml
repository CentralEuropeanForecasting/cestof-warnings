name: Update lightning

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: mkdir -p data

      - name: Run lightning once
        run: python lightning_live_map.py
        env:
          RUN_ONCE: "1"

      - name: Convert to GeoJSON
        run: python csv_to_geojson.py

      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*
          git diff --cached --quiet || git commit -m "Auto lightning update"
          git push
