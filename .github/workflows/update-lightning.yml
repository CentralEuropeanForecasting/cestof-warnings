name: Update lightning

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  live-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Prepare data folder
        run: mkdir -p data

      - name: Run lightning once
        run: python lightning_live_map.py
        env:
          RUN_ONCE: "1"

      - name: Convert to GeoJSON
        run: python csv_to_geojson.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*
          git diff --cached --quiet || git commit -m "Auto lightning update"
          git push

  daily-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if Prague time is 00:05
        run: |
          HOUR=$(TZ=Europe/Prague date +%H)
          MINUTE=$(TZ=Europe/Prague date +%M)

          if [ "$HOUR" != "00" ] || [ "$MINUTE" != "05" ]; then
            echo "Not 00:05 Prague time. Skipping archive."
            exit 0
          fi

      - name: Set archive date
        run: |
          DATE=$(TZ=Europe/Prague date -d "yesterday" +%F)
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "YEAR=$(TZ=Europe/Prague date -d "$DATE" +%Y)" >> $GITHUB_ENV
          echo "MONTH=$(TZ=Europe/Prague date -d "$DATE" +%m)" >> $GITHUB_ENV
          echo "DAY=$(TZ=Europe/Prague date -d "$DATE" +%d)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install archive packages
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib geopandas shapely pillow scipy pyogrio

      - name: Find daily CSV
        run: |
          if [ -f "data/${DATE}.csv" ]; then
            echo "CSV=data/${DATE}.csv" >> $GITHUB_ENV
          elif [ -f "${DATE}.csv" ]; then
            echo "CSV=${DATE}.csv" >> $GITHUB_ENV
          else
            echo "CSV not found for ${DATE}"
            exit 1
          fi

      - name: Run anale.py
        run: python anale.py "$CSV"

      - name: Copy PNGs to lightning.html folders
        run: |
          DEST="img/lightning/${YEAR}/${MONTH}/${DAY}"
          mkdir -p "$DEST"

          cp output/01_hour_map_discrete.png "$DEST/day_hour_map.png" || true
          cp output/03_density_map.png "$DEST/day_density_map.png" || true
          cp output/03d_density_absolute_25km2.png "$DEST/day_density_absolute_25km2.png" || true
          cp output/10_country_strike_map.png "$DEST/day_country_map.png" || true
          cp output/12_province_strike_map.png "$DEST/day_province_map.png" || true
          cp output/05_hourly_counts.png "$DEST/day_hourly_counts.png" || true
          cp output/07_time_detail.png "$DEST/day_time_detail.png" || true
          cp output/06_hourly_mean_intensity.png "$DEST/day_hourly_mean_intensity.png" || true

      - name: Commit archive PNGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add img/lightning/*
          git diff --cached --quiet || git commit -m "Update lightning archive for ${DATE}"
          git push
