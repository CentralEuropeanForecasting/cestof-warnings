name: Update lightning

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  live-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Prepare data folder
        run: mkdir -p data

      - name: Run lightning once
        run: python lightning_live_map.py
        env:
          RUN_ONCE: "1"

      - name: Convert to GeoJSON
        run: python csv_to_geojson.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*

          if git diff --cached --quiet; then
            echo "No live lightning changes."
            exit 0
          fi

          git commit -m "Auto lightning update"

          git pull --rebase origin main
          git push

  daily-overview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if Prague time is 00:05
        run: |
          HOUR=$(TZ=Europe/Prague date +%H)
          MINUTE=$(TZ=Europe/Prague date +%M)

          if [ "$HOUR" != "00" ] || [ "$MINUTE" != "05" ]; then
            echo "Not 00:05 Prague time. Skipping overview."
            exit 0
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install overview packages
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib geopandas shapely scipy pyogrio

      - name: Run overview.py
        run: python overview.py

      - name: Commit overview outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/overviews || true

          if git diff --cached --quiet; then
            echo "No overview changes."
            exit 0
          fi

          git commit -m "Update lightning overview"

          git pull --rebase origin main
          git push
