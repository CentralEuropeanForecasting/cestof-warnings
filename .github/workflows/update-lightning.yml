name: Update lightning

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (change if needed)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------
      # SETUP PYTHON
      # -------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------
      # INSTALL DEPENDENCIES
      # -------------------------
      - name: Install dependencies
        run: |
          pip install pandas matplotlib geopandas shapely scipy numpy pyproj fiona

      # -------------------------
      # RUN OVERVIEW SCRIPT
      # -------------------------
      - name: Run overview generator
        run: |
          python overview.py

      # -------------------------
      # COPY ALL PNG OUTPUTS
      # -------------------------
      - name: Copy ALL overview PNGs to website folders
        run: |
          mkdir -p img/lightning/days
          mkdir -p img/lightning/week
          mkdir -p img/lightning/month
          mkdir -p img/lightning/year

          copy_pngs () {
            SRC="$1"
            DEST="$2"
            mkdir -p "$DEST"
            cp "$SRC"/*.png "$DEST/" 2>/dev/null || true
          }

          # DAYS
          if [ -d output/overviews/days ]; then
            for folder in output/overviews/days/*; do
              [ -d "$folder" ] || continue
              name=$(basename "$folder")
              copy_pngs "$folder" "img/lightning/days/$name"
            done
          fi

          # WEEK (2026-W14 → 2026_W14)
          if [ -d output/overviews/week ]; then
            for folder in output/overviews/week/*; do
              [ -d "$folder" ] || continue
              name=$(basename "$folder" | sed 's/-W/_W/')
              copy_pngs "$folder" "img/lightning/week/$name"
            done
          fi

          # MONTH (2026-04 → 2026_04)
          if [ -d output/overviews/month ]; then
            for folder in output/overviews/month/*; do
              [ -d "$folder" ] || continue
              name=$(basename "$folder" | sed 's/-/_/')
              copy_pngs "$folder" "img/lightning/month/$name"
            done
          fi

          # YEAR
          if [ -d output/overviews/year ]; then
            for folder in output/overviews/year/*; do
              [ -d "$folder" ] || continue
              name=$(basename "$folder")
              copy_pngs "$folder" "img/lightning/year/$name"
            done
          fi

      # -------------------------
      # COMMIT ONLY WEBSITE FILES
      # -------------------------
      - name: Commit overview PNGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add img/lightning || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update lightning overview PNGs"
          git push
