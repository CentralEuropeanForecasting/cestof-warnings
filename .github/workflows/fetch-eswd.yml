name: Fetch ESWD Reports

on:
  workflow_dispatch:
  schedule:
    - cron: "20 4 * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ESWD reports
        env:
          ESWD_TOKEN: ${{ secrets.ESWD_TOKEN }}
        run: |
          mkdir -p data/eswd_reports

          python3 <<'PY'
          import os
          import json
          import urllib.parse
          import urllib.request
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          token = os.environ.get("ESWD_TOKEN")
          if not token:
              raise SystemExit("Missing ESWD_TOKEN secret")

          token = token.strip()

          tz = ZoneInfo("Europe/Prague")
          utc = ZoneInfo("UTC")

          now = datetime.now(tz)

          # Latest finished 06:00 -> 06:00 CEST/CET period
          end = now.replace(hour=6, minute=0, second=0, microsecond=0)
          if now < end:
              end -= timedelta(days=1)

          start = end - timedelta(days=1)

          forecast_date = start.date().isoformat()

          params = {
              "sd": start.astimezone(utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "ed": end.astimezone(utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "countries": "CZ,SK,PL,DE,AT,HU,SI,HR,CH,LI",
              "levels": "QC0,QC0+,QC1,QC2",
              "types": "TORNADO,FUNNEL,GUSTNADO,HAIL,PRECIP,WIND,LIGHTNING,DEVIL"
          }

          url = "https://eswd.eu/api/v2/reportList?" + urllib.parse.urlencode(params)

          print("Fetching:")
          print(url)

          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": token,
                  "Accept": "application/json",
                  "User-Agent": "CESTOF forecast verification"
              }
          )

          try:
              with urllib.request.urlopen(req, timeout=90) as r:
                  raw = r.read().decode("utf-8")
          except urllib.error.HTTPError as e:
              print("HTTP error:", e.code, e.reason)
              print("Response:")
              print(e.read().decode("utf-8", errors="replace"))
              raise

          data = json.loads(raw)

          reports = []

          for x in data:
              if x.get("LATITUDE") is None or x.get("LONGITUDE") is None:
                  continue

              reports.append({
                  "id": x.get("id"),
                  "lat": x.get("LATITUDE"),
                  "lon": x.get("LONGITUDE"),
                  "type": x.get("TYPE_EVENT"),
                  "time": x.get("TIME_EVENT"),
                  "country": x.get("COUNTRY"),
                  "qc": x.get("QC_LEVEL"),
                  "place": x.get("PLACE"),
                  "place_accuracy": x.get("PLACE_ACCURACY"),
                  "time_accuracy": x.get("TIME_ACCURACY"),
                  "description": x.get("EVENT_DESCRIPTION"),
                  "info_source": x.get("INFO_SOURCE"),
                  "references": x.get("REFERENCE")
              })

          output = {
              "forecast_date": forecast_date,
              "window_start_local": start.isoformat(),
              "window_end_local": end.isoformat(),
              "window_start_utc": start.astimezone(utc).isoformat(),
              "window_end_utc": end.astimezone(utc).isoformat(),
              "source": "ESWD",
              "raw_count": len(data),
              "report_count": len(reports),
              "reports": reports
          }

          path = f"data/eswd_reports/{forecast_date}.json"

          with open(path, "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print("Saved:", path)
          print("Reports:", len(reports))
          PY

      - name: Commit ESWD report file
        run: |
          git config user.name "CESTOF ESWD Bot"
          git config user.email "actions@github.com"

          git add data/eswd_reports/*.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update ESWD reports"
            git push
          fi
