name: Send new CESTOF warnings to Discord

on:
  push:
    branches:
      - main
    paths:
      - "warnings-day1.geojson"

permissions:
  contents: read

jobs:
  send-new-warnings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current and previous versions
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find and send new warnings
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WARNING_WEBHOOK }}
          BEFORE_SHA: ${{ github.event.before }}

        run: |
          python3 <<'PY'
          import json
          import os
          import subprocess
          import urllib.error
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          FILE = "warnings-day1.geojson"
          webhook = os.environ.get("DISCORD_WEBHOOK")
          before_sha = os.environ.get("BEFORE_SHA", "")
          local_timezone = ZoneInfo("Europe/Prague")

          if not webhook:
              raise SystemExit(
                  "Missing DISCORD_WARNING_WEBHOOK repository secret."
              )

          def load_json_file(path):
              try:
                  with open(path, "r", encoding="utf-8") as file:
                      return json.load(file)
              except FileNotFoundError:
                  print(f"{path} was not found.")
                  return {"features": []}
              except json.JSONDecodeError as error:
                  raise SystemExit(
                      f"Could not read {path} as JSON: {error}"
                  )

          def load_previous_data():
              if not before_sha or set(before_sha) == {"0"}:
                  print("No previous commit is available.")
                  return {"features": []}

              try:
                  previous_text = subprocess.check_output(
                      ["git", "show", f"{before_sha}:{FILE}"],
                      text=True,
                      stderr=subprocess.STDOUT
                  )

                  return json.loads(previous_text)

              except subprocess.CalledProcessError as error:
                  print(
                      "Could not load the previous warning file:",
                      error.output
                  )
                  return {"features": []}

              except json.JSONDecodeError as error:
                  print(
                      "The previous warning file was not valid JSON:",
                      error
                  )
                  return {"features": []}

          def warning_id(feature):
              properties = feature.get("properties") or {}
              return str(properties.get("id") or "").strip()

          def format_time(value):
              if not value:
                  return "Not specified"

              try:
                  parsed_time = datetime.fromisoformat(
                      str(value).replace("Z", "+00:00")
                  )

                  if parsed_time.tzinfo is None:
                      parsed_time = parsed_time.replace(
                          tzinfo=local_timezone
                      )
                  else:
                      parsed_time = parsed_time.astimezone(
                          local_timezone
                      )

                  timezone_name = parsed_time.tzname() or "CEST"

                  return parsed_time.strftime(
                      f"%d.%m.%Y %H:%M {timezone_name}"
                  )

              except (ValueError, TypeError):
                  return str(value)

          def safe_discord_text(value, maximum_length):
              text = str(value or "").strip()

              if not text:
                  return "Not specified"

              if len(text) > maximum_length:
                  return text[:maximum_length - 1] + "…"

              return text

          current_data = load_json_file(FILE)
          previous_data = load_previous_data()

          old_ids = {
              warning_id(feature)
              for feature in previous_data.get("features", [])
              if warning_id(feature)
          }

          new_features = [
              feature
              for feature in current_data.get("features", [])
              if warning_id(feature)
              and warning_id(feature) not in old_ids
          ]

          print(f"Previous warning IDs: {len(old_ids)}")
          print(f"New warnings found: {len(new_features)}")

          colours = {
              "Thunderstorm Watch": 16753920,
              "Thunderstorm Warning": 2401060,
              "Thunderstorm PDS": 16724016,
              "Tornado Watch": 16765952,
              "Tornado Warning": 11534521,
              "Tornado PDS": 16711935,
              "Tornado Emergency": 8061183,
              "Hail Warning": 51455,
              "Hail PDS": 61695,
              "Heavy Rain / Flooding Watch": 4899839,
              "Heavy Rain / Flooding Warning": 26367,
              "Heavy Rain / Flooding PDS": 12472,
              "Wind Gusts Warning": 16747520,
              "Wind Gusts PDS": 16726784,
              "Mesoscale Discussion": 11898112
          }

          hazard_labels = {
              "hail": "Maximum hail",
              "wind": "Wind gusts",
              "tornado_probability": "Tornado probability",
              "rotation": "Rotation"
          }

          for feature in new_features:
              properties = feature.get("properties") or {}

              warning_type = safe_discord_text(
                  properties.get("type") or "CESTOF Warning",
                  256
              )

              location = safe_discord_text(
                  properties.get("location") or "Not specified",
                  1024
              )

              warning_text = safe_discord_text(
                  properties.get("text")
                  or "A new CESTOF warning has been issued.",
                  4096
              )

              issued_by = safe_discord_text(
                  properties.get("forecaster_name")
                  or properties.get("issued_by")
                  or properties.get("nowcaster")
                  or properties.get("forecaster")
                  or properties.get("author")
                  or "Unknown nowcaster",
                  1024
              )

              issued = format_time(
                  properties.get("issued_iso")
                  or properties.get("issued")
              )

              expires = format_time(
                  properties.get("expires_iso")
                  or properties.get("expires")
              )

              hazards = properties.get("hazards") or {}

              fields = [
                  {
                      "name": "Affected area",
                      "value": location,
                      "inline": False
                  },
                  {
                      "name": "Issued by",
                      "value": issued_by,
                      "inline": False
                  },
                  {
                      "name": "Issued",
                      "value": issued,
                      "inline": True
                  },
                  {
                      "name": "Expires",
                      "value": expires,
                      "inline": True
                  }
              ]

              for key, label in hazard_labels.items():
                  value = (
                      hazards.get(key)
                      or properties.get(key)
                  )

                  if value:
                      fields.append({
                          "name": label,
                          "value": safe_discord_text(value, 1024),
                          "inline": True
                      })

              warning_identifier = warning_id(feature)

              payload = {
                  "username": "CESTOF Warnings",
                  "allowed_mentions": {
                      "parse": []
                  },
                  "embeds": [
                      {
                          "title": warning_type,
                          "url": "https://www.cestof.com/radar",
                          "description": warning_text,
                          "color": colours.get(
                              warning_type,
                              16711680
                          ),
                          "fields": fields,
                          "footer": {
                              "text": (
                                  "Central European Storm Forecasts"
                                  f" | CESTOF | {warning_identifier}"
                              )
                          },
                          "timestamp": datetime.now(
                              local_timezone
                          ).isoformat()
                      }
                  ]
              }

              request = urllib.request.Request(
                  webhook,
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "CESTOF-GitHub-Action"
                  },
                  method="POST"
              )

              try:
                  with urllib.request.urlopen(
                      request,
                      timeout=30
                  ) as response:
                      print(
                          f"Sent {warning_type}: "
                          f"HTTP {response.status}"
                      )

              except urllib.error.HTTPError as error:
                  response_body = error.read().decode(
                      "utf-8",
                      errors="replace"
                  )

                  raise SystemExit(
                      f"Discord returned HTTP {error.code}: "
                      f"{response_body}"
                  )

              except urllib.error.URLError as error:
                  raise SystemExit(
                      f"Could not contact Discord: {error}"
                  )

          if not new_features:
              print("No new warnings were added. Nothing was sent.")
          PY
