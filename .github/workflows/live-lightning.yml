name: Update lightning live

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

permissions:
  contents: write

concurrency:
  group: update-lightning-live
  cancel-in-progress: true

jobs:
  update-live:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install live packages
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Prepare data folder
        run: mkdir -p data

      - name: Run lightning once
        run: python lightning_live_map.py
        env:
          RUN_ONCE: "1"

      - name: Convert latest lightning to GeoJSON
        run: python csv_to_geojson.py

      - name: Commit latest lightning
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/latest_europe.geojson data/*.csv || true

          if git diff --cached --quiet; then
            echo "No live lightning changes."
            exit 0
          fi

          git commit -m "Update live lightning"
          git pull --rebase origin main
          git push
